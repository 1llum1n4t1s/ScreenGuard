name: Publish to Chrome Web Store

on:
  push:
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  publish:
    name: Chrome Web Store 公開
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        # SHA 固定でサプライチェーン攻撃耐性を確保（タグはミュータブル）
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: バージョンを取得
        id: version
        run: |
          version=$(grep -oP '(?<="version": ")[^"]+' manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "📦 公開対象バージョン: $version"

      - name: ブランチ名とバージョンの整合性を確認
        env:
          BRANCH_VERSION: ${{ github.ref_name }}
          MANIFEST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          expected="release/${MANIFEST_VERSION}"
          if [ "$BRANCH_VERSION" != "$expected" ]; then
            echo "::error::ブランチ名 ($BRANCH_VERSION) と manifest.json のバージョン ($MANIFEST_VERSION) が一致しません。期待値: $expected"
            exit 1
          fi
          echo "✅ ブランチ名と manifest バージョン一致: $expected"

      - name: pnpm セットアップ
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 11

      - name: Node セットアップ
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 依存インストール（lockfile 厳密一致のみ許可）
        # lockfile 不整合時の暗黙の install フォールバックを禁止
        # 失敗したら lockfile を手動更新してから再実行すること
        run: pnpm install --frozen-lockfile

      - name: アイコン生成
        run: node scripts/generate-icons.js

      - name: zip パッケージを作成
        run: |
          zip -r screen-curtain.zip manifest.json icons src \
            -x "*.DS_Store" "*.swp" "*~"
          ls -lh screen-curtain.zip

      - name: Chrome Web Store にアップロード & 公開
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        # pnpm install で devDeps に固定した chrome-webstore-upload-cli を使用
        # （`npx --yes @3` 実行時の patch 版サプライチェーン攻撃を回避）
        run: |
          pnpm exec chrome-webstore-upload upload \
            --source screen-curtain.zip \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish
          echo "🎉 Chrome Web Store への公開リクエストを送信したよ〜"
