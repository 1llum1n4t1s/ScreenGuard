<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="curtainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d5dde5" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="curtainShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- 装飾（控えめ） -->
  <circle cx="80" cy="80" r="120" fill="white" opacity="0.04"/>
  <circle cx="440" cy="440" r="100" fill="white" opacity="0.03"/>

  <!-- ウィンドウ -->
  <g filter="url(#shadow)">
    <rect x="80" y="100" width="352" height="280" rx="16" fill="url(#windowGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <!-- タイトルバー -->
    <rect x="80" y="100" width="352" height="36" rx="16" fill="#263d55"/>
    <rect x="80" y="120" width="352" height="16" fill="#263d55"/>
    <!-- ドット -->
    <circle cx="106" cy="118" r="6" fill="#ff5f57"/>
    <circle cx="126" cy="118" r="6" fill="#ffbd2e"/>
    <circle cx="146" cy="118" r="6" fill="#28ca42"/>
    <!-- コンテンツ行 -->
    <rect x="108" y="156" width="160" height="8" rx="4" fill="rgba(255,255,255,0.12)"/>
    <rect x="108" y="174" width="280" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>
    <rect x="108" y="188" width="240" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>
    <rect x="108" y="202" width="260" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>
    <rect x="108" y="224" width="120" height="8" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="108" y="242" width="220" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>
    <rect x="108" y="256" width="200" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>
    <rect x="108" y="270" width="250" height="6" rx="3" fill="rgba(255,255,255,0.07)"/>
  </g>

  <!-- カーテン（オーバーレイ） - 上から降りてくるイメージ -->
  <g filter="url(#curtainShadow)">
    <rect x="92" y="136" width="328" height="196" rx="10" fill="url(#curtainGrad)"/>
    <!-- カーテンの微妙なテクスチャ -->
    <rect x="92" y="136" width="328" height="196" rx="10" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
    <!-- リサイズハンドル（角） -->
    <rect x="92" y="136" width="10" height="10" rx="3" fill="rgba(0,0,0,0.08)"/>
    <rect x="410" y="136" width="10" height="10" rx="3" fill="rgba(0,0,0,0.08)"/>
    <rect x="92" y="322" width="10" height="10" rx="3" fill="rgba(0,0,0,0.08)"/>
    <rect x="410" y="322" width="10" height="10" rx="3" fill="rgba(0,0,0,0.08)"/>
  </g>

  <!-- 閉じるボタン（丸形） -->
  <g transform="translate(396, 144)">
    <circle cx="0" cy="0" r="12" fill="rgba(0,0,0,0.1)"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="rgba(0,0,0,0.4)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="rgba(0,0,0,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 下部のアクセント：カーテンの下端が少し見えるコンテンツ -->
  <!-- ウィンドウの残り部分（カーテンで隠されていない部分） -->

</svg>
