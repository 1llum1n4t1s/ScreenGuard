<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot 1 - Popup UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1280px;
      height: 800px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .browser-mockup {
      width: 920px;
      height: 600px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      position: relative;
    }

    .browser-header {
      height: 40px;
      background: #f1f3f5;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }

    .browser-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #28ca42; }

    .browser-url {
      flex: 1;
      height: 24px;
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      color: #868e96;
      margin-left: 12px;
    }

    .browser-content {
      height: calc(100% - 40px);
      background: white;
      padding: 40px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      position: relative;
    }

    .page-content {
      flex: 1;
      max-width: 420px;
      padding-top: 20px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: #212529;
      margin-bottom: 16px;
    }

    .page-text {
      font-size: 15px;
      line-height: 1.8;
      color: #495057;
      margin-bottom: 12px;
    }

    .page-image-placeholder {
      width: 100%;
      height: 120px;
      background: linear-gradient(135deg, #e9ecef, #dee2e6);
      border-radius: 8px;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #adb5bd;
      font-size: 14px;
    }

    /* Extension Popup */
    .extension-popup {
      position: absolute;
      top: 55px;
      right: 40px;
      width: 280px;
      background: #f8f9fa;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      border: 1px solid #dee2e6;
      overflow: hidden;
    }

    .popup-header {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      padding: 14px 16px;
      color: white;
      text-align: center;
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .popup-body {
      padding: 16px;
    }

    .btn-show-overlay {
      width: 100%;
      padding: 12px;
      background: linear-gradient(180deg, #6c757d, #5a6268);
      color: white;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      margin-bottom: 14px;
    }

    .timer-section {
      background: white;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 12px;
    }

    .timer-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #495057;
    }

    .timer-toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #3498db;
    }

    .timer-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }

    .timer-input {
      width: 48px;
      height: 32px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      text-align: center;
      font-size: 14px;
      color: #495057;
      background: white;
    }

    .timer-label {
      font-size: 12px;
      color: #6c757d;
    }

    .popup-arrow {
      position: absolute;
      top: 50px;
      right: 320px;
      font-size: 36px;
      color: rgba(255, 255, 255, 0.6);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }

    .watermark {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 600;
      letter-spacing: 1px;
    }

    .caption {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.8);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="caption">ワンクリックでページを隠す</div>

  <div class="browser-mockup">
    <div class="browser-header">
      <div class="browser-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <div class="browser-url">https://example.com/article</div>
    </div>
    <div class="browser-content">
      <div class="page-content">
        <h1 class="page-title">今日のニュース記事</h1>
        <p class="page-text">ここにページの内容が表示されています。Screen Shade を使えば、ワンクリックでページ全体を覆い隠すことができます。</p>
        <p class="page-text">プレゼン中の画面切り替えや、離席時のプライバシー保護に最適です。</p>
        <div class="page-image-placeholder">画像プレースホルダー</div>
      </div>

      <div class="popup-arrow">→</div>

      <div class="extension-popup">
        <div class="popup-header">
          <div class="popup-title">Screen Shade</div>
        </div>
        <div class="popup-body">
          <div class="btn-show-overlay">Show Overlay</div>
          <div class="timer-section">
            <label class="timer-toggle">
              <input type="checkbox" checked />
              <span>自動非表示:</span>
            </label>
            <div class="timer-inputs">
              <div class="timer-input">3</div>
              <span class="timer-label">分</span>
              <div class="timer-input">0</div>
              <span class="timer-label">秒</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="watermark">Screen Shade</div>
</body>
</html>
