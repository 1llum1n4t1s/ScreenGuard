<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot 2 - Overlay Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1280px;
      height: 800px;
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .browser-mockup {
      width: 920px;
      height: 580px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      position: relative;
    }

    .browser-header {
      height: 40px;
      background: #f1f3f5;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }

    .browser-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #28ca42; }

    .browser-url {
      flex: 1;
      height: 24px;
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      color: #868e96;
      margin-left: 12px;
    }

    .browser-content {
      height: calc(100% - 40px);
      background: white;
      position: relative;
    }

    /* ページ内容（背景に薄く見える） */
    .page-behind {
      position: absolute;
      inset: 0;
      padding: 30px;
      opacity: 0.15;
    }

    .page-behind h1 {
      font-size: 24px;
      color: #212529;
      margin-bottom: 12px;
    }

    .page-behind p {
      font-size: 14px;
      color: #495057;
      line-height: 1.8;
      margin-bottom: 8px;
    }

    /* オーバーレイ */
    .shade-overlay {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      background: #e4e4e4;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 閉じるボタン */
    .close-btn {
      position: absolute;
      top: 20px;
      right: 25px;
      width: 32px;
      height: 32px;
      background: #e74c3c;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn::before,
    .close-btn::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 3px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 1px;
    }

    .close-btn::before { transform: rotate(45deg); }
    .close-btn::after { transform: rotate(-45deg); }

    /* タイマー表示 */
    .timer-display {
      font-size: 60px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      color: #515173;
      font-weight: 300;
      letter-spacing: 2px;
    }

    /* リサイズハンドル */
    .handle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #bfbdbd;
      border-radius: 2px;
    }

    .handle-nw { top: 0; left: 0; }
    .handle-ne { top: 0; right: 0; }
    .handle-sw { bottom: 0; left: 0; }
    .handle-se { bottom: 0; right: 0; }

    .caption {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.85);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .feature-badges {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
    }

    .feature-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 20px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .watermark {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.25);
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="caption">オーバーレイでページを覆い隠す</div>

  <div class="browser-mockup">
    <div class="browser-header">
      <div class="browser-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <div class="browser-url">https://example.com/article</div>
    </div>
    <div class="browser-content">
      <div class="page-behind">
        <h1>機密レポート - 2025年度</h1>
        <p>このページには重要な情報が含まれています。離席時や画面共有時にはScreen Shadeで隠しましょう。</p>
        <p>オーバーレイは自由にリサイズ可能で、タイマーによる自動非表示にも対応しています。</p>
      </div>

      <div class="shade-overlay">
        <div class="close-btn"></div>
        <div class="timer-display">2 min 45 sec</div>
        <div class="handle handle-nw"></div>
        <div class="handle handle-ne"></div>
        <div class="handle handle-sw"></div>
        <div class="handle handle-se"></div>
      </div>
    </div>
  </div>

  <div class="feature-badges">
    <div class="feature-badge">🔒 プライバシー保護</div>
    <div class="feature-badge">⏱️ タイマー付き</div>
    <div class="feature-badge">↔️ リサイズ可能</div>
  </div>

  <div class="watermark">Screen Shade</div>
</body>
</html>
