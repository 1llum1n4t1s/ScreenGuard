<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot 1 - Popup UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 800px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .caption {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.85);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ブラウザモックアップ */
    .browser-mockup {
      width: 920px;
      height: 600px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      position: relative;
    }

    .browser-header {
      height: 40px;
      background: #f1f3f5;
      border-bottom: 1px solid #dee2e6;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
    }

    .browser-dots { display: flex; gap: 6px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #28ca42; }

    .browser-url {
      flex: 1;
      height: 24px;
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 12px;
      display: flex;
      align-items: center;
      color: #868e96;
      margin-left: 12px;
    }

    .browser-content {
      height: calc(100% - 40px);
      background: white;
      padding: 40px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      position: relative;
    }

    .page-content {
      flex: 1;
      max-width: 420px;
      padding-top: 20px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: #212529;
      margin-bottom: 16px;
    }

    .page-text {
      font-size: 15px;
      line-height: 1.8;
      color: #495057;
      margin-bottom: 12px;
    }

    .page-image-placeholder {
      width: 100%;
      height: 120px;
      background: linear-gradient(135deg, #e9ecef, #dee2e6);
      border-radius: 8px;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #adb5bd;
      font-size: 14px;
    }

    /* ポップアップモック */
    .extension-popup {
      position: absolute;
      top: 55px;
      right: 40px;
      width: 260px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      border: 1px solid #e0e0e0;
      overflow: hidden;
    }

    .popup-body { padding: 14px 16px; }

    /* テーマセレクタ */
    .theme-selector {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .theme-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 500;
      color: #666;
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 6px;
    }
    .theme-btn.selected {
      border-color: #5b8def;
      color: #333;
      background: #eef4ff;
      box-shadow: 0 0 0 1px rgba(91,141,239,0.2);
    }
    .theme-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid #ccc;
    }
    .swatch-light { background: #f0f0f0; }
    .swatch-dark { background: #2a2a2e; border-color: #555; }
    .swatch-glass {
      background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(200,200,255,0.3));
      border-color: #aab;
    }

    /* ぼかし設定 */
    .blur-setting {
      margin-bottom: 12px;
      padding: 8px 10px;
      background: #f8f9fb;
      border-radius: 6px;
      border: 1px solid #e8e8e8;
    }
    .blur-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }
    .blur-value { font-weight: 600; color: #5b8def; }
    .blur-range {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: #ddd;
      border-radius: 2px;
      outline: none;
    }
    .blur-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #5b8def;
      border: none;
    }

    /* ボタン */
    .action-buttons {
      display: flex;
      gap: 8px;
    }
    .btn-primary {
      flex: 1;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      background: linear-gradient(#fff 5%, #f5f5f5 100%);
      border: 1px solid #d4d4d4;
      border-radius: 6px;
      text-align: center;
    }
    .btn-reset {
      padding: 7px 12px;
      font-size: 11px;
      color: #888;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .popup-arrow {
      position: absolute;
      top: 50px;
      right: 305px;
      font-size: 36px;
      color: rgba(255, 255, 255, 0.6);
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }

    .watermark {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 600;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="caption">ワンクリックでページを隠す</div>

  <div class="browser-mockup">
    <div class="browser-header">
      <div class="browser-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <div class="browser-url">https://example.com/article</div>
    </div>
    <div class="browser-content">
      <div class="page-content">
        <h1 class="page-title">今日のニュース記事</h1>
        <p class="page-text">ここにページの内容が表示されています。スクリーンカーテンを使えば、ワンクリックでページ全体を覆い隠すことができます。</p>
        <p class="page-text">プレゼン中の画面切り替えや、離席時のプライバシー保護に最適です。</p>
        <div class="page-image-placeholder">画像プレースホルダー</div>
      </div>

      <div class="popup-arrow">→</div>

      <div class="extension-popup">
        <div class="popup-body">
          <div class="theme-selector">
            <div class="theme-btn"><span class="theme-swatch swatch-light"></span>Light</div>
            <div class="theme-btn"><span class="theme-swatch swatch-dark"></span>Dark</div>
            <div class="theme-btn selected"><span class="theme-swatch swatch-glass"></span>Glass</div>
          </div>
          <div class="blur-setting">
            <div class="blur-label"><span>ぼかし強度</span><span class="blur-value">5px</span></div>
            <input type="range" class="blur-range" min="1" max="20" value="5" />
          </div>
          <div class="action-buttons">
            <div class="btn-primary">オーバーレイを表示</div>
            <div class="btn-reset">リセット</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="watermark">スクリーンカーテン</div>
</body>
</html>
